<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<title>C Imtihon Platformasi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b12;--bg2:#0c1018;--bg3:#111724;--bg4:#1a2035;
  --border:#1e2740;--border2:#253050;
  --text:#c9d1e0;--text2:#7a8299;--text3:#4a5270;
  --green:#3ddc84;--green-dim:rgba(61,220,132,.12);
  --blue:#4d9eff;--blue-dim:rgba(77,158,255,.12);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,.12);
  --orange:#fb923c;--orange-dim:rgba(251,146,60,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --yellow:#fbbf24;
}
html,body{height:100%;overflow:hidden}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* Scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Layout */
#wrap{display:flex;flex:1;overflow:hidden;position:relative}

/* Sidebar */
#sb{width:220px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
#sb-hdr{padding:14px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--green),var(--blue));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:.02em}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-label{font-size:9px;color:var(--text3);letter-spacing:.08em}
.prog-num{font-size:9px;color:var(--green);font-weight:700}
.pbar{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:1px;transition:width .4s cubic-bezier(.4,0,.2,1)}

.tl{padding:10px 16px 4px;font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.tl::after{content:'';flex:1;height:1px;background:var(--border);opacity:.6}
.pi{padding:7px 16px;cursor:pointer;border-left:2px solid transparent;display:flex;align-items:center;gap:7px;transition:background .15s}
.pi:hover{background:rgba(255,255,255,.03)}
.pi.act{background:rgba(255,255,255,.05)}
.db{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:700;flex-shrink:0;letter-spacing:.03em}
.pn{font-size:10.5px;flex:1;color:var(--text2);line-height:1.3;transition:color .15s}
.pi.act .pn,.pi:hover .pn{color:var(--text)}
.ck{font-size:11px;color:var(--green);flex-shrink:0}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-shrink:0;background:var(--bg2)}
.ttag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;flex-shrink:0}
.ptitle{font-size:13px;color:#fff;font-weight:600;font-family:'Syne',sans-serif}
.dtag{font-size:9px;padding:2px 8px;border-radius:4px;margin-left:auto;flex-shrink:0;font-weight:700}

#ca{flex:1;display:flex;overflow:hidden}

/* Description panel */
#dp{width:250px;border-right:1px solid var(--border);overflow-y:auto;padding:14px;flex-shrink:0;background:var(--bg2)}
.desc-label{font-size:8.5px;font-weight:700;letter-spacing:.12em;color:var(--text3);margin-bottom:8px;text-transform:uppercase}
.dt{font-size:11px;color:var(--text);line-height:1.85;white-space:pre-wrap}
.tcl{font-size:8.5px;color:var(--text3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:16px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tcl::after{content:'';flex:1;height:1px;background:var(--border);opacity:.5}
.tcb{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px;margin-bottom:6px;font-size:10px}
.tk{color:var(--text3);font-size:9px;letter-spacing:.06em;margin-bottom:2px}
.tv{color:var(--blue);font-family:'JetBrains Mono',monospace;white-space:pre;font-size:10.5px}
.te{color:var(--green);font-family:'JetBrains Mono',monospace;font-size:10.5px}

/* Editor panel */
#ep{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#tabbar{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.tab{padding:9px 13px;font-size:11px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;margin-bottom:-1px;transition:color .15s,border-color .15s;letter-spacing:.02em}
.tab:hover{color:var(--text)}
.tab.on{border-bottom-color:var(--blue);color:var(--blue)}
#tbr{margin-left:auto;display:flex;gap:7px;align-items:center}
.hbtn{padding:5px 12px;font-size:10.5px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:5px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s;letter-spacing:.02em}
.hbtn:hover{border-color:var(--yellow);color:var(--yellow)}
.rbtn{padding:5px 18px;font-size:11px;font-weight:700;background:linear-gradient(135deg,#16a34a,#15803d);border:none;color:#fff;border-radius:5px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s;letter-spacing:.03em;position:relative;overflow:hidden}
.rbtn:hover{background:linear-gradient(135deg,#22c55e,#16a34a);transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,197,94,.3)}
.rbtn:active{transform:translateY(0)}
.rbtn.loading{background:linear-gradient(135deg,#1e3a2a,#162e20)}
.rbtn:disabled,.hbtn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}


#tc{flex:1;display:flex;overflow:hidden;position:relative}
textarea#ce{width:100%;height:100%;background:var(--bg);color:#d4dae8;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;padding:16px;resize:none;tab-size:4;caret-color:var(--green)}
textarea#ce::selection{background:rgba(77,158,255,.2)}

/* Output panel */
.op-wrap{flex:1;overflow-y:auto;padding:14px}
.cerr{background:var(--red-dim);border:1px solid rgba(248,113,113,.3);border-radius:6px;padding:12px;margin-bottom:12px}
.cerrt{font-size:9.5px;color:var(--red);font-weight:700;margin-bottom:7px;letter-spacing:.06em;display:flex;align-items:center;gap:5px}
.cerrb{font-size:11px;color:#fca5a5;white-space:pre-wrap;line-height:1.7}
.tr{margin-bottom:8px;padding:11px 13px;border-radius:6px;font-size:11px}
.trp{background:rgba(61,220,132,.07);border:1px solid rgba(61,220,132,.2)}
.trf{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2)}
.trs{font-weight:700;margin-bottom:6px;font-size:11px}
.trd{color:var(--text2);margin-top:4px;font-size:10.5px}
.trd span{margin-left:6px;font-family:'JetBrains Mono',monospace;font-size:11px}
.em{color:var(--text3);font-size:11.5px;text-align:center;margin-top:40px;line-height:2}
.ht{font-size:9.5px;color:var(--yellow);font-weight:700;margin-bottom:10px;letter-spacing:.08em;display:flex;align-items:center;gap:5px}
.hbody{font-size:12px;color:var(--text);line-height:1.9;white-space:pre-wrap;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:14px}
.hin{margin-top:12px;padding:9px 11px;background:rgba(251,191,36,.07);border-radius:5px;font-size:10px;color:#92764a;border-left:2px solid rgba(251,191,36,.3);line-height:1.6}
.sumrow{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:var(--bg3);border-radius:6px;border:1px solid var(--border);font-size:10.5px;color:var(--text2)}
.sumrow .sc{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff}
.win-banner{background:linear-gradient(135deg,rgba(61,220,132,.15),rgba(77,158,255,.1));border:1px solid rgba(61,220,132,.3);border-radius:8px;padding:14px;text-align:center;margin-bottom:12px}
.win-emoji{font-size:28px;margin-bottom:4px}
.win-text{font-size:12px;color:var(--green);font-weight:700;letter-spacing:.05em}

/* Loading spinner */
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-row{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:11px;padding:14px}

/* Progress toast */
#toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;font-size:11px;font-weight:700;padding:8px 14px;border-radius:6px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-family:'Syne',sans-serif}
#toast.show{opacity:1}


#key-status.ok{background:rgba(61,220,132,.1);border-color:rgba(61,220,132,.3);color:var(--green)}
#key-status.no{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red)}
</style>
</head>
<body>
<div id="wrap">
  <div id="sb">
    <div id="sb-hdr">
      <div class="logo">
        <div class="logo-icon">⌨</div>
        <div>
          <div class="logo-text">C IMTIHON</div>

        </div>

</div>

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}


function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function buildSidebar(){
  const body=document.getElementById('sb-body');
  const tops=[...new Set(P.map(x=>x.top))];
  let h='';
  tops.forEach(t=>{
    const c=TC[t],ps=P.filter(x=>x.top===t);
    h+=`<div class="tl" style="color:${c.a}">${t} · ${ps[0].tn}</div>`;
    ps.forEach(p=>{
      const d=DC[p.d],ac=cur.id===p.id;
      h+=`<div class="pi${ac?' act':''}" style="${ac?`border-left-color:${TC[p.top].a}`:''}" onclick="selP(${p.id})">
        <span class="db" style="background:${d.bg};color:${d.c}">${d.l[0]}</span>
        <span class="pn">${esc(p.title)}</span>
        ${solved.has(p.id)?'<span class="ck">✓</span>':''}
      </div>`;
    });
  });
  body.innerHTML=h;
  const pct=Math.round(solved.size/P.length*100);
  document.getElementById('prog-text').textContent=`${solved.size} / ${P.length} yechildi`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('pbar').style.width=pct+'%';
}

function updateHeader(){
  const p=cur,tc2=TC[p.top],d=DC[p.d];
  const tt=document.getElementById('topic-tag');
  tt.textContent=p.top;
  tt.style.cssText=`background:${tc2.bg};color:${tc2.a};font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700`;
  document.getElementById('ptitle').textContent=p.title;
  const dt=document.getElementById('diff-tag');
  dt.textContent=d.l;
  dt.style.cssText=`background:${d.bg};color:${d.c};font-size:9px;padding:2px 8px;border-radius:4px;margin-left:auto;font-weight:700`;
  document.getElementById('desc').textContent=p.desc;
  document.getElementById('tcs').innerHTML=p.tests.map(t=>`<div class="tcb">
    <div class="tk">Kirish:</div><div class="tv">${esc(t.i)}</div>
    <div class="tk" style="margin-top:4px">Kutilgan:</div><div class="te">${esc(t.e)}</div>
  </div>`).join('');
}

function selP(id){
  cur=P.find(x=>x.id===id);
  results=[];cerr='';hint='';tab='e';
  buildSidebar();updateHeader();showTab('e');
}

function setTab(t){tab=t;showTab(t);}

function showTab(t){
  ['e','o','h'].forEach(x=>{
    document.getElementById('tab-'+x).className='tab'+(x===t?' on':'');
  });
  const tc3=document.getElementById('tc');
  if(t==='e'){
    tc3.innerHTML='<textarea id="ce" spellcheck="false"></textarea>';
    const ce=document.getElementById('ce');
    ce.value=cur.code;
    ce.addEventListener('input',()=>{cur.code=ce.value;});
    ce.addEventListener('keydown',e=>{
      if(e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart;e.target.value=e.target.value.substring(0,s)+'    '+e.target.value.substring(e.target.selectionEnd);e.target.selectionStart=e.target.selectionEnd=s+4;cur.code=e.target.value;}
      if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCode();}
    });
  } else if(t==='o'){
    let h='';
    if(cerr) h+=`<div class="cerr"><div class="cerrt">⛔ KOMPILYATSIYA XATOSI</div><div class="cerrb">${esc(cerr)}</div></div>`;
    if(results.length){
      const ok=results.filter(r=>r.ok).length;
      const allOk=ok===results.length;
      if(allOk) h+=`<div class="win-banner"><div class="win-emoji">🎉</div><div class="win-text">BARCHA TESTLAR O'TDI!</div></div>`;
      h+=`<div class="sumrow"><span class="sc">${ok}/${results.length}</span> test o'tdi ${allOk?'✅':''}</div>`;
      results.forEach(r=>{
        h+=`<div class="tr ${r.ok?'trp':'trf'}">
          <div class="trs" style="color:${r.ok?'#3ddc84':'#f87171'}">${r.ok?'✓ O\'tdi':'✗ Xato'} — Test ${r.id}</div>
          ${!r.ok?`<div class="trd">Kirish: <span style="color:#4d9eff">${esc(r.inp)}</span></div>
            <div class="trd">Kutilgan: <span style="color:#3ddc84">${esc(r.exp)}</span></div>
            <div class="trd">Sizniki: <span style="color:#f87171">${esc(r.got||"(bo'sh)")}</span></div>
            ${r.err?`<div style="color:#fca5a5;font-size:10px;margin-top:5px;white-space:pre-wrap;background:rgba(248,113,113,.07);padding:7px;border-radius:4px">${esc(r.err.substring(0,500))}</div>`:''}`:''}</div>`;
      });
    }
    if(!cerr&&!results.length) h='<div class="em">Kodni yozib<br>▶ Ishga tushir tugmasini bosing<br><span style="font-size:9px;color:#2a3050">Ctrl+Enter ham ishlaydi</span></div>';
    tc3.innerHTML=`<div class="op-wrap">${h}</div>`;
  } else {
    let h='';
    if(hint) h=`<div class="ht">💡 MASLAHAT</div><div class="hbody">${esc(hint)}</div>`;
    else h=`<div class="em">💡 Hint tugmasini bosing</div>`;
    tc3.innerHTML=`<div class="op-wrap">${h}</div>`;
  }
}

// /api/run — Piston orqali kompilyatsiya (bepul, kalitsiz)
async function runCode_api(code, stdin){
  const resp = await fetch('/api/run', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ code, stdin })
  });
  const data = await resp.json();
  return data; // {stdout, stderr, compile_error, error}
}

async function runCode(){
  const rb = document.getElementById('rbtn');
  rb.disabled = true;
  rb.className = 'rbtn loading';
  rb.innerHTML = '<span class="spin"></span>';
  results = []; cerr = ''; tab = 'o';

  // Loading ko'rsatish
  document.getElementById('tc').innerHTML = `<div class="op-wrap"><div class="loader-row"><span class="spin"></span> Claude kodni tekshirmoqda...</div></div>`;

  try {
    for(let i = 0; i < cur.tests.length; i++){
      const t = cur.tests[i];

      document.getElementById('tc').innerHTML = `<div class="op-wrap"><div class="loader-row"><span class="spin"></span> Test ${i+1}/${cur.tests.length} bajarilmoqda...</div></div>`;

      const data = await runCode_api(cur.code, t.i);

      if(data.error){ cerr = data.error; break; }
      if(data.compile_error){ cerr = data.compile_error; break; }

      const got = data.stdout || '';
      results.push({id:i+1, inp:t.i, exp:t.e, got, ok: got===t.e, err: data.stderr||''});
    }

    if(!cerr && results.length && results.every(r=>r.ok)){
      solved.add(cur.id);
      buildSidebar();
      showToast('🎉 Masala yechildi!');
    }
  } catch(e) {
    cerr = 'API xatosi: '+e.message;
  }

  rb.disabled = false;
  rb.className = 'rbtn';
  rb.textContent = '▶ Ishga tushir';
  showTab('o');
}

function getHint(){
  hint = cur.hint;
  tab = 'h';
  showTab('h');
}

buildSidebar(); updateHeader();
document.getElementById('ce').value = cur.code;
document.getElementById('ce').addEventListener('input', e => cur.code = e.target.value);
document.getElementById('ce').addEventListener('keydown', e => {
  if(e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart;e.target.value=e.target.value.substring(0,s)+'    '+e.target.value.substring(e.target.selectionEnd);e.target.selectionStart=e.target.selectionEnd=s+4;cur.code=e.target.value;}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCode();}
});
</script>
